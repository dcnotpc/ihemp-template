name: Content Validation

# Runs on every push and every PR targeting main.
# Required status check — merge is blocked if this fails.
# Status check name (for branch protection rule): "Validate content frontmatter"

on:
  push:
    branches:
      - main
      - "phase-*"
      - "feat/*"
      - "fix/*"
      - "hotfix/*"
      - "ci-self-test"  # temporary — self-test only, remove after verification
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate content frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ihemp-template/package-lock.json

      - name: Install dependencies
        working-directory: ihemp-template
        run: npm ci

      - name: Run content validator
        working-directory: ihemp-template
        run: npm run validate
        # Exit code 1 from validate-content.ts will fail this step,
        # which fails the job, which blocks the PR merge.
